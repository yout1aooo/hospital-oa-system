# Tomcat
server:
  port: 9200

# Spring
spring:
  application:
    # 应用名称
    name: hospital-auth
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        # 配置中心地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 配置文件格式
        file-extension: yml
  config:
    import:
      - nacos:application-${spring.profiles.active}.yml
      - nacos:${spring.application.name}-${spring.profiles.active}.yml
