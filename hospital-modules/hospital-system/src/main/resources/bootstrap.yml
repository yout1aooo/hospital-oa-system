# Tomcat
server:
  port: 9201

# Spring
spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  application:
    # 应用名称
    name: hospital-system
  profiles:
    # 环境配置
    active: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/hospital_oa}
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        # 配置中心地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 配置文件格式
        file-extension: yml
  config:
    import:
      - nacos:application-${spring.profiles.active}.yml
      - nacos:${spring.application.name}-${spring.profiles.active}.yml
