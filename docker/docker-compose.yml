version : '3.8'
services:
  hospital-nacos:
    container_name: hospital-nacos
    image: nacos/nacos-server:v3.0.2
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=your_auth_token
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - hospital-mysql
  hospital-mysql:
    container_name: hospital-mysql
    image: mysql:5.7
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]
    environment:
      MYSQL_DATABASE: 'hospital-cloud'
      MYSQL_ROOT_PASSWORD: 123456
  hospital-redis:
    container_name: hospital-redis
    image: redis
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/hospital/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/hospital/redis/redis.conf
  hospital-nginx:
    container_name: hospital-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/hospital/projects/hospital-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - hospital-gateway
    links:
      - hospital-gateway
  hospital-gateway:
    container_name: hospital-gateway
    build:
      context: ./hospital/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - hospital-redis
    links:
      - hospital-redis
  hospital-auth:
    container_name: hospital-auth
    build:
      context: ./hospital/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - hospital-redis
    links:
      - hospital-redis
  hospital-modules-system:
    container_name: hospital-modules-system
    build:
      context: ./hospital/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - hospital-redis
      - hospital-mysql
    links:
      - hospital-redis
      - hospital-mysql
  hospital-modules-gen:
    container_name: hospital-modules-gen
    build:
      context: ./hospital/modules/gen
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    depends_on:
      - hospital-mysql
    links:
      - hospital-mysql
  hospital-modules-job:
    container_name: hospital-modules-job
    build:
      context: ./hospital/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - hospital-mysql
    links:
      - hospital-mysql
  hospital-modules-file:
    container_name: hospital-modules-file
    build:
      context: ./hospital/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./hospital/uploadPath:/home/hospital/uploadPath
  hospital-visual-monitor:
    container_name: hospital-visual-monitor
    build:
      context: ./hospital/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
